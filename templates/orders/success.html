{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-7 text-center">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="#198754" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                        <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                    </svg>
                </div>
                <h2 class="fw-bold text-success">Payment Successful!</h2>
                <p class="lead">Thank you for shopping with <strong>Reach Africa</strong>. Your order has been placed and is being processed.</p>
                <div class="bg-light p-3 rounded mb-4">
                    <p class="mb-1">Order Reference: <strong>#{{ order.id }}</strong></p>
                    <p class="mb-0">Paystack Ref: <small class="text-muted">{{ order.paystack_ref }}</small></p>
                </div>
                <div class="d-grid gap-2">
                    <a href="{% url 'track_order' order.id %}" class="btn btn-primary btn-lg">Track Delivery Status</a>
                    <a href="{% url 'product_list' %}" class="btn btn-outline-secondary">Continue Shopping</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
