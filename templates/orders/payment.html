{% extends 'base.html' %}
{% load currency_tags %}

{% block content %}
<div class="container py-5 text-center">
    <div class="card shadow-sm p-4 mx-auto" style="max-width: 500px;">
        <h3>Complete Your Payment</h3>
        <p class="text-muted">Order #{{ order.id }}</p>
        <hr>
        <div class="d-flex justify-content-between mb-3">
            <span>Total Amount:</span>
            <strong class="text-primary">{{ CURRENCY_SYMBOL }}{{ order.total_amount|multiply:CURRENCY_RATE|floatformat:2 }}</strong>
        </div>

        <button type="button" class="btn btn-success btn-lg w-100" onclick="payWithPaystack()"> 
            Pay Now 
        </button>
    </div>
</div>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script>
  function payWithPaystack() {
    let handler = PaystackPop.setup({
      key: '{{ paystack_public_key }}', // Your Public Key
      email: '{{ email }}',
      amount: {{ paystack_amount }}, // Amount in Kobo
      currency: 'NGN',
      ref: 'LOKO_' + Math.floor((Math.random() * 1000000000) + 1), // Generate random ref
      callback: function(response) {
        // This runs after successful payment
        window.location.href = "{% url 'payment_success' %}?reference=" + response.reference;
      },
      onClose: function() {
        alert('Transaction cancelled.');
      }
    });
    handler.openIframe();
  }
</script>
{% endblock %}
