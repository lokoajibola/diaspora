{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="mb-0">Edit Product</h3>
                <a href="{% url 'vendor_dashboard' %}" class="btn btn-outline-secondary btn-sm">Back to Dashboard</a>
            </div>

            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <div class="mb-3">
                            <label for="additionalImages" class="form-label">Add More Images</label>
                            <input type="file" name="additional_images" id="additionalImages" class="form-control" multiple accept="image/*">
                            <small class="text-muted">Upload extra images for this product.</small>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <a href="{% url 'vendor_dashboard' %}" class="btn btn-link text-muted">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h6 class="mb-0">Current Images</h6>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-6 col-md-3">
                            <small class="text-muted d-block mb-1">Main image</small>
                            <img src="{{ product.image.url }}" alt="{{ product.name }}" class="img-fluid rounded border">
                        </div>
                        {% for image in gallery_images %}
                        <div class="col-6 col-md-3">
                            <img src="{{ image.image.url }}" alt="{{ product.name }} image" class="img-fluid rounded border">
                            <form action="{% url 'delete_product_image' product.id image.id %}" method="POST" class="mt-2">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-sm btn-outline-danger w-100">Delete</button>
                            </form>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
