{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h4 class="mb-4">Your Alerts</h4>
    <div class="list-group shadow-sm">
        {% for note in notifications %}
            <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                <div>
                    <p class="mb-1">{{ note.message }}</p>
                    <small class="text-muted">{{ note.created_at|timesince }} ago</small>
                </div>
                {% if note.link %}
                    <a href="{{ note.link }}" class="btn btn-sm btn-outline-primary">View</a>
                {% endif %}
            </div>
        {% empty %}
            <p class="p-4 text-center">No notifications yet.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
